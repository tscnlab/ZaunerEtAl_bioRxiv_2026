project:
  type: website
  output-dir: docs
  render:
    - data_preparation.qmd
    - metric_preparation.qmd
    - descriptives.qmd
    - RQ1.qmd
    - RQ2.qmd
    - RQ3.qmd
    - RQ1_chest.qmd
    - RQ2_chest.qmd
    - RQ3_chest.qmd
    - index.qmd

manuscript:
  resources:
    - data/metric_types.xlsx

website:
  title: "Multi-country comparison of the light exposome"
  site-url: https://tscnlab.github.io/ZaunerEtAl_bioRxiv_2026
  repo-url: https://github.com/tscnlab/ZaunerEtAl_bioRxiv_2026/
  issue-url: https://github.com/tscnlab/ZaunerEtAl_bioRxiv_2026/issues
  repo-actions: [edit, issue]
  page-navigation: true
  bread-crumbs: true
  sidebar:
    style: "docked"
    search: true
    contents:
      - href: index.qmd
        text: <strong>Manuscript</strong>
      - href: https://github.com/MeLiDosProject
        text: Data source
      - text: "License"
        href: LICENSE.md
      - text: ---
      - text: <strong>General</strong>
      - href: data_preparation.qmd
        text: "Data preparation"
      - href: metric_preparation.qmd
        text: "Metric preparation"
      - href: descriptives.qmd
        text: "Descriptive summaries"
      - text: ---
      - text: <strong>Glasses-level analysis</strong>
      - href: RQ1.qmd
        text: "RQ1: environmental effects"
      - href: RQ2.qmd
        text: "RQ2: behavioural effects"
      - href: RQ3.qmd
        text: "RQ3: individual effects"
      - text: ---
      - text: <strong>Chest-level analysis</strong>
      - href: RQ1_chest.qmd
        text: "RQ1: environmental effects"
      - href: RQ2_chest.qmd
        text: "RQ2: behavioural effects"
      - href: RQ3_chest.qmd
        text: "RQ3: individual effects"
      - icon: github
        href: https://github.com/tscnlab/ZaunerEtAl_bioRxiv_2026
        aria-label: Quarto GitHub


format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    html-math-method: katex
    link-external-newwindow: true
    toc: true
    # comments:
      # hypothesis: true
    format:
    code-link: true
    code-line-numbers: true
    toc-location: left
    toc-depth: 3
    toc-expand: 2
  # typst:
  #   toc: true
  #   toc-depth: 3
  #   number-sections: true
  #   papersize: a4
  #   fig-format: png
  #   fig-dpi: 600
  #   fig-height: 3.45
format-links:
  - html
  # - format: typst
  #   text: PDF
  #   icon: file-pdf

date: last-modified

language:
  title-block-published: "Last modified:"

execute:
  warning: false
  error: false
  echo: true
  freeze: auto
